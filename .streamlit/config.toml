[theme]
base            = "dark"
primaryColor    = "#FEE500"    # 카카오 옐로우
backgroundColor = "#1a1a2e"
secondaryBackgroundColor = "#16213e"
textColor       = "#FAFAFA"
font            = "sans serif"

[server]
port            = 8501
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = false
